services:
  financial-api:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__FinancialDb: Server=host.docker.internal,${PORTAL_SQLSERVER_PORT:-1433};Database=FinancieroDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:?Set the same SQLSERVER_SA_PASSWORD used by PortalCorporativo .env};Encrypt=true;TrustServerCertificate=true
      Portal__GatewayBaseUrl: ${PORTAL_GATEWAY_BASE_URL:-http://host.docker.internal:8080}
      Portal__UsePortalAudit: ${USE_PORTAL_AUDIT:-false}
      Portal__UsePortalNotification: ${USE_PORTAL_NOTIFICATION:-false}
      Portal__UsePortalOutbox: ${USE_PORTAL_OUTBOX:-false}
      Portal__UsePortalConfiguration: ${USE_PORTAL_CONFIGURATION:-false}
      FinancialPlatform__TenantId: default
      Database__Initialize: "true"
      Database__RunMigrations: "true"
      financial__sri__issuer__ruc: ${SRI_ISSUER_RUC:-9999999999999}
      financial__sri__issuer__legalName: ${SRI_ISSUER_LEGAL_NAME:-EMISOR DESARROLLO}
      financial__sri__issuer__tradeName: ${SRI_ISSUER_TRADE_NAME:-EMISOR DESARROLLO}
      financial__sri__issuer__address: ${SRI_ISSUER_ADDRESS:-DIRECCION DESARROLLO}
      financial__sri__issuer__accountingRequired: ${SRI_ACCOUNTING_REQUIRED:-true}
      financial__sri__environment: ${SRI_ENVIRONMENT:-Test}
      financial__sri__integration__mode: ${SRI_INTEGRATION_MODE:-Development}
      financial__sri__allowProduction: ${SRI_ALLOW_PRODUCTION:-false}
      financial__sri__logPayloads: ${SRI_LOG_PAYLOADS:-false}
      financial__sri__maskPayloads: ${SRI_MASK_PAYLOADS:-true}
      financial__sri__test__dryRun: ${SRI_TEST_DRY_RUN:-true}
      financial__sri__test__allowConnectivityProbe: ${SRI_TEST_ALLOW_CONNECTIVITY_PROBE:-false}
      financial__sri__test__allowDocumentSend: ${SRI_TEST_ALLOW_DOCUMENT_SEND:-false}
      financial__sri__test__manualValidationRequired: ${SRI_TEST_MANUAL_VALIDATION_REQUIRED:-true}
      financial__sri__test__useSyntheticDocumentOnly: ${SRI_TEST_USE_SYNTHETIC_DOCUMENT_ONLY:-true}
      financial__sri__test__syntheticIssuerRuc: ${SRI_TEST_SYNTHETIC_ISSUER_RUC:-9999999999999}
      financial__sri__test__syntheticCustomerIdentification: ${SRI_TEST_SYNTHETIC_CUSTOMER_IDENTIFICATION:-9999999999}
      financial__sri__test__maxManualAttempts: ${SRI_TEST_MAX_MANUAL_ATTEMPTS:-1}
      financial__sri__emissionType: ${SRI_EMISSION_TYPE:-Normal}
      financial__sri__defaultEstablishmentCode: ${SRI_DEFAULT_ESTABLISHMENT_CODE:-001}
      financial__sri__defaultEmissionPointCode: ${SRI_DEFAULT_EMISSION_POINT_CODE:-001}
      financial__sri__signature__provider: ${SRI_SIGNATURE_PROVIDER:-Development}
      financial__sri__signature__certificateSource: ${SRI_SIGNATURE_CERTIFICATE_SOURCE:-SecretStore}
      financial__sri__signature__certificateSecretName: ${SRI_SIGNATURE_CERTIFICATE_SECRET_NAME:-}
      financial__sri__signature__certificatePasswordSecretName: ${SRI_SIGNATURE_CERTIFICATE_PASSWORD_SECRET_NAME:-}
      financial__sri__signature__keyVaultName: ${SRI_SIGNATURE_KEY_VAULT_NAME:-}
      financial__sri__signature__timestampPolicy: ${SRI_SIGNATURE_TIMESTAMP_POLICY:-}
      financial__sri__signature__requireOcsp: ${SRI_SIGNATURE_REQUIRE_OCSP:-false}
      financial__sri__signature__localCertificatePath: ${SRI_SIGNATURE_LOCAL_CERTIFICATE_PATH:-}
      financial__sri__signature__localCertificatePasswordSecretName: ${SRI_SIGNATURE_LOCAL_CERTIFICATE_PASSWORD_SECRET_NAME:-}
      financial__sri__signature__requireTrustedCertificate: ${SRI_SIGNATURE_REQUIRE_TRUSTED_CERTIFICATE:-true}
      financial__sri__timeoutSeconds: ${SRI_TIMEOUT_SECONDS:-30}
      financial__sri__maxRetries: ${SRI_MAX_RETRIES:-3}
      financial__sri__retryDelaySeconds: ${SRI_RETRY_DELAY_SECONDS:-5}
      financial__sri__xml__validation__mode: ${SRI_XML_VALIDATION_MODE:-Basic}
      financial__sri__xml__validation__failOnWarning: ${SRI_XML_VALIDATION_FAIL_ON_WARNING:-true}
      financial__sri__storage__provider: ${SRI_STORAGE_PROVIDER:-Development}
      financial__sri__storage__portalBaseUrl: ${SRI_STORAGE_PORTAL_BASE_URL:-}
      financial__sri__storage__uploadPath: ${SRI_STORAGE_UPLOAD_PATH:-/api/content-files}
      financial__sri__storage__container: ${SRI_STORAGE_CONTAINER:-financial-electronic-documents}
      financial__sri__storage__timeoutSeconds: ${SRI_STORAGE_TIMEOUT_SECONDS:-30}
      financial__sri__storage__sendPayloads: ${SRI_STORAGE_SEND_PAYLOADS:-false}
      financial__sri__storage__maskPayloads: ${SRI_STORAGE_MASK_PAYLOADS:-true}
      financial__sri__storage__allowProductionContentFilePayload: ${SRI_STORAGE_ALLOW_PRODUCTION_CONTENT_FILE_PAYLOAD:-false}
      financial__sri__storage__allowProductionPayload: ${SRI_STORAGE_ALLOW_PRODUCTION_PAYLOAD:-false}
      financial__sri__storage__dryRun: ${SRI_STORAGE_DRY_RUN:-true}
      financial__sri__storage__authRequired: ${SRI_STORAGE_AUTH_REQUIRED:-false}
      financial__sri__storage__authToken: ${SRI_STORAGE_AUTH_TOKEN:-}
      financial__sri__storage__retainXml: ${SRI_STORAGE_RETAIN_XML:-true}
      financial__sri__storage__retainPdf: ${SRI_STORAGE_RETAIN_PDF:-false}
      Jwt__Issuer: ${JWT_ISSUER:-portal-corporativo}
      Jwt__Audience: ${JWT_AUDIENCE:-portal-corporativo-clients}
      Jwt__Secret: ${JWT_SECRET:?Set JWT_SECRET in .env}
      Seq__ServerUrl: ${SEQ_SERVER_URL:-http://host.docker.internal:5341}
      financial__secrets__provider: ${FINANCIAL_SECRETS_PROVIDER:-Disabled}
      financial__secrets__keyVaultName: ${FINANCIAL_SECRETS_KEY_VAULT_NAME:-}
      financial__secrets__useDefaultAzureCredential: ${FINANCIAL_SECRETS_USE_DEFAULT_AZURE_CREDENTIAL:-false}
      financial__secrets__requireManagedIdentity: ${FINANCIAL_SECRETS_REQUIRE_MANAGED_IDENTITY:-false}
      financial__secrets__allowDevelopmentSecrets: ${FINANCIAL_SECRETS_ALLOW_DEVELOPMENT_SECRETS:-false}
      financial__secrets__maskSecretsInLogs: ${FINANCIAL_SECRETS_MASK_SECRETS_IN_LOGS:-true}
      financial__secrets__failFastOnStartup: ${FINANCIAL_SECRETS_FAIL_FAST_ON_STARTUP:-false}
    ports: ["${FINANCIAL_API_PORT:-8081}:8080"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
